<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      var path = window.location.pathname;
      window.location.replace(
        window.location.origin + '/' + path.split('/')[1] + 
        '/?p=/' + path.split('/').slice(2).join('/') + 
        window.location.search
      );
    </script>
  </head>
  <body></body>
</html>
